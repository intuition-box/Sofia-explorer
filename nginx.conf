server {
    listen 80;

    # GraphQL proxy
    location /v1/graphql {
        proxy_pass https://mainnet.intuition.sh/v1/graphql;
        proxy_set_header Host mainnet.intuition.sh;
        proxy_ssl_server_name on;
    }

    # ENS RPC proxy
    location /eth-rpc {
        proxy_pass https://cloudflare-eth.com/;
        proxy_set_header Host cloudflare-eth.com;
        proxy_ssl_server_name on;
    }

    # MCP Trust proxy
    location /mcp-trust/ {
        proxy_pass https://mcp-trust.intuition.box/;
        proxy_set_header Host mcp-trust.intuition.box;
        proxy_ssl_server_name on;
    }

    # SPA — serve static files, fallback to index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
